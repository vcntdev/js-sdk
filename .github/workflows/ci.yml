name: CI

on:
  push:

jobs:
  lint:
    name: "Lint Code"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ vars.PNPM_VERSION }}
      - name: Set-up Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ vars.NODEJS_VERSION }}
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run lint